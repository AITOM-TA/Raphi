<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Casse-Briques — Rabargo</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0a0a0a; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; font-family:'Courier New',monospace; color:#fff; padding:16px; }
    .back { position:fixed; top:16px; left:16px; color:#555; text-decoration:none; font-size:0.78rem; letter-spacing:0.15em; transition:color 0.15s; z-index:10; }
    .back:hover { color:#a855f7; }
    h1 { font-size:clamp(1.4rem,5vw,2rem); letter-spacing:0.3em; color:#a855f7; text-shadow:0 0 20px #a855f788; margin-bottom:8px; }
    #hud { display:flex; gap:28px; margin-bottom:10px; font-size:0.8rem; letter-spacing:0.1em; color:#666; }
    #hud span { color:#a855f7; font-weight:bold; font-size:0.95rem; }
    #game-wrapper { position:relative; border:2px solid #a855f733; border-radius:4px; box-shadow:0 0 40px #a855f711; max-width:100%; }
    canvas { display:block; max-width:100%; }
    #overlay { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,0,0,0.86); border-radius:4px; gap:12px; padding:20px; }
    #overlay h2 { font-size:clamp(1.3rem,5vw,1.8rem); color:#a855f7; text-shadow:0 0 16px #a855f7; letter-spacing:0.2em; }
    #overlay p  { color:#aaa; font-size:0.82rem; letter-spacing:0.05em; text-align:center; }
    #overlay button { padding:12px 36px; background:transparent; border:2px solid #a855f7; color:#a855f7; font-family:'Courier New',monospace; font-size:1rem; letter-spacing:0.2em; cursor:pointer; border-radius:2px; transition:background 0.15s,color 0.15s; }
    #overlay button:hover { background:#a855f7; color:#fff; }
    #score-form { display:none; flex-direction:column; align-items:center; gap:8px; width:100%; }
    #player-name { background:#0a0a0a; border:1px solid #a855f744; color:#fff; font-family:'Courier New',monospace; font-size:0.95rem; padding:8px 14px; border-radius:3px; letter-spacing:0.12em; text-align:center; width:180px; }
    #player-name:focus { outline:none; border-color:#a855f7; }
    #save-btn { padding:9px 24px; background:#a855f7; border:2px solid #a855f7; color:#fff; font-family:'Courier New',monospace; font-size:0.78rem; letter-spacing:0.15em; cursor:pointer; border-radius:2px; font-weight:700; transition:opacity 0.15s; }
    #save-btn:disabled { opacity:0.5; cursor:default; }
    #lb-wrap { display:none; flex-direction:column; align-items:center; width:100%; gap:6px; }
    .lb-ttl  { font-size:0.54rem; letter-spacing:0.28em; color:#a855f766; }
    #lb-table { width:100%; max-width:210px; }
    .lb-row  { display:flex; justify-content:space-between; font-size:0.74rem; padding:3px 0; border-bottom:1px solid #181818; color:#555; }
    .lb-row.top1 { color:#fff; font-weight:700; }
    .lb-row.me   { color:#a855f7; }
    #kb-hint { margin-top:10px; color:#333; font-size:0.72rem; letter-spacing:0.08em; }
    @media (max-width:600px),(pointer:coarse) { #kb-hint { display:none; } }
  </style>
</head>
<body>
  <a class="back" href="/">← RABARGO</a>
  <h1>CASSE-BRIQUES</h1>
  <div id="hud">SCORE <span id="sc">0</span> &nbsp; VIES <span id="lv">♥♥♥</span> &nbsp; NIVEAU <span id="nv">1</span></div>
  <div id="game-wrapper">
    <canvas id="canvas"></canvas>
    <div id="overlay">
      <h2 id="ov-title">CASSE-BRIQUES</h2>
      <p id="ov-msg">Souris · Doigt · Flèches pour bouger</p>
      <div id="score-form">
        <input id="player-name" type="text" placeholder="Ton prénom" maxlength="16" autocomplete="off" spellcheck="false"/>
        <button id="save-btn">ENREGISTRER →</button>
      </div>
      <div id="lb-wrap">
        <div class="lb-ttl">TOP SCORES — CASSE-BRIQUES</div>
        <div id="lb-table"></div>
      </div>
      <button id="start-btn">JOUER</button>
    </div>
  </div>
  <div id="kb-hint">← → ou souris pour déplacer la raquette</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const SUPABASE_URL = 'https://phqyccawwwpdvslxzljl.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBocXljY2F3d3dwZHZzbHh6bGpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDU4NzQzNjYsImV4cCI6MjA2MTQ1MDM2Nn0.0XaL9_7uEFkVF_PizrtpAcbQ9kqgMnMyqWVUGbeMHvo';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let savedScore = 0;

    // ── Canvas ────────────────────────────
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');
    const CW = 480, CH = 520;
    canvas.width = CW; canvas.height = CH;
    function calcSize() {
      const w = Math.min(CW, window.innerWidth - 32);
      canvas.style.width  = w + 'px';
      canvas.style.height = Math.round(CH * w / CW) + 'px';
    }
    calcSize();

    // ── Brick grid ────────────────────────
    const BCOLS = 11, BROWS = 7;
    const BW = 36, BH = 14, BGAP = 5;
    const BOFF_X = Math.round((CW - BCOLS*(BW+BGAP) + BGAP) / 2);
    const BOFF_Y = 52;
    const BCOLORS = ['#ef4444','#fb923c','#facc15','#4ade80','#22d3ee','#60a5fa','#a855f7'];
    const BPTS    = [70, 60, 50, 40, 30, 20, 10];

    // ── Paddle ────────────────────────────
    const PH = 12, PAD_SPEED = 320;
    let padW = 80, padX = CW / 2;
    const PAD_Y = CH - 30;

    // ── Ball ──────────────────────────────
    const BRAD = 7;
    let ball = {x:0,y:0,vx:0,vy:0};
    const BASE_SPEED = 320;

    // ── State ─────────────────────────────
    let bricks=[], score=0, lives=3, level=1;
    let running=false, ballLaunched=false, rafId=0, lastTs=0;
    const keys={};

    function mkBricks() {
      bricks=[];
      for(let r=0;r<BROWS;r++)
        for(let c=0;c<BCOLS;c++)
          bricks.push({r,c, x:BOFF_X+c*(BW+BGAP), y:BOFF_Y+r*(BH+BGAP), alive:true, pts:BPTS[r]});
    }
    function resetBall() {
      ball.x=padX; ball.y=PAD_Y-BRAD-1; ball.vx=0; ball.vy=0;
      ballLaunched=false;
    }
    function launchBall() {
      if(ballLaunched) return;
      const sp=BASE_SPEED+(level-1)*25;
      const angle=(Math.random()*0.6+0.2)*Math.PI; // 36°–144° upward
      ball.vx=sp*Math.cos(angle)*(Math.random()<0.5?1:-1);
      ball.vy=-sp*Math.abs(Math.sin(angle));
      ballLaunched=true;
    }

    // ── Update ────────────────────────────
    function update(dt) {
      // Paddle keyboard
      if(keys.ArrowLeft||keys.a)  padX=Math.max(padW/2, padX-PAD_SPEED*dt);
      if(keys.ArrowRight||keys.d) padX=Math.min(CW-padW/2, padX+PAD_SPEED*dt);
      // Ball follows paddle before launch
      if(!ballLaunched) { ball.x=padX; ball.y=PAD_Y-BRAD-1; return; }

      // Move ball
      ball.x+=ball.vx*dt; ball.y+=ball.vy*dt;

      // Wall bounces
      if(ball.x-BRAD<=0)   { ball.x=BRAD;      ball.vx=Math.abs(ball.vx); }
      if(ball.x+BRAD>=CW)  { ball.x=CW-BRAD;   ball.vx=-Math.abs(ball.vx); }
      if(ball.y-BRAD<=0)   { ball.y=BRAD;       ball.vy=Math.abs(ball.vy); }

      // Ball lost
      if(ball.y-BRAD>CH+20) {
        lives--;
        document.getElementById('lv').textContent='♥'.repeat(Math.max(0,lives));
        if(lives<=0) { doGameOver(); return; }
        resetBall();
        return;
      }

      // Paddle collision
      if(ball.vy>0 &&
         ball.y+BRAD>=PAD_Y-PH/2 && ball.y+BRAD<=PAD_Y+PH &&
         ball.x>=padX-padW/2-BRAD && ball.x<=padX+padW/2+BRAD) {
        ball.y=PAD_Y-PH/2-BRAD;
        const rel=(ball.x-padX)/(padW/2);      // -1..1
        const sp=Math.sqrt(ball.vx*ball.vx+ball.vy*ball.vy);
        ball.vx=rel*sp*0.9;
        ball.vy=-Math.sqrt(Math.max(sp*sp-ball.vx*ball.vx, sp*sp*0.2));
      }

      // Brick collisions
      for(const b of bricks) {
        if(!b.alive) continue;
        const bx=b.x, by=b.y, bw=BW, bh=BH;
        if(ball.x+BRAD>bx&&ball.x-BRAD<bx+bw&&ball.y+BRAD>by&&ball.y-BRAD<by+bh) {
          b.alive=false; score+=b.pts;
          document.getElementById('sc').textContent=score;
          const overL=ball.x+BRAD-bx, overR=bx+bw-(ball.x-BRAD);
          const overT=ball.y+BRAD-by, overB=by+bh-(ball.y-BRAD);
          if(Math.min(overL,overR)<Math.min(overT,overB)) ball.vx=-ball.vx;
          else ball.vy=-ball.vy;
          break;
        }
      }
      // All bricks cleared → next level
      if(!bricks.some(b=>b.alive)) nextLevel();
    }

    function nextLevel() {
      level++;
      document.getElementById('nv').textContent=level;
      mkBricks(); resetBall();
    }

    // ── Draw ──────────────────────────────
    function draw() {
      ctx.fillStyle='#060610'; ctx.fillRect(0,0,CW,CH);
      // bricks
      for(const b of bricks) {
        if(!b.alive) continue;
        ctx.fillStyle=BCOLORS[b.r];
        ctx.shadowColor=BCOLORS[b.r]; ctx.shadowBlur=4;
        ctx.beginPath(); ctx.roundRect(b.x,b.y,BW,BH,3); ctx.fill();
        ctx.shadowBlur=0;
        // shine
        ctx.fillStyle='rgba(255,255,255,0.18)';
        ctx.beginPath(); ctx.roundRect(b.x+2,b.y+2,BW-4,4,1); ctx.fill();
      }
      // paddle
      ctx.fillStyle='#a855f7'; ctx.shadowColor='#a855f7'; ctx.shadowBlur=12;
      ctx.beginPath(); ctx.roundRect(padX-padW/2, PAD_Y-PH, padW, PH, 4); ctx.fill();
      ctx.shadowBlur=0;
      // ball
      ctx.fillStyle='#fff'; ctx.shadowColor='#a855f7'; ctx.shadowBlur=14;
      ctx.beginPath(); ctx.arc(ball.x,ball.y,BRAD,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
      // launch hint
      if(!ballLaunched&&running) {
        ctx.fillStyle='#ffffff33';
        ctx.font='11px "Courier New"';
        ctx.textAlign='center';
        ctx.fillText('ESPACE ou TAP pour lancer', CW/2, PAD_Y-28);
      }
    }

    // ── Game flow ─────────────────────────
    function gameLoop(ts) {
      if(!running) return;
      const dt=Math.min(0.05,(ts-lastTs)/1000); lastTs=ts;
      update(dt); draw();
      rafId=requestAnimationFrame(gameLoop);
    }
    function startGame() {
      score=0; lives=3; level=1; padX=CW/2; padW=80;
      document.getElementById('sc').textContent=0;
      document.getElementById('lv').textContent='♥♥♥';
      document.getElementById('nv').textContent=1;
      document.getElementById('overlay').style.display='none';
      document.getElementById('score-form').style.display='none';
      document.getElementById('lb-wrap').style.display='none';
      mkBricks(); resetBall();
      running=true; lastTs=performance.now();
      rafId=requestAnimationFrame(gameLoop);
    }
    function doGameOver() {
      running=false; cancelAnimationFrame(rafId);
      savedScore=score;
      document.getElementById('ov-title').textContent='GAME OVER';
      document.getElementById('ov-msg').textContent=`Score : ${score}`;
      document.getElementById('start-btn').textContent='REJOUER';
      document.getElementById('overlay').style.display='flex';
      document.getElementById('lb-wrap').style.display='none';
      if(score>0) {
        const form=document.getElementById('score-form'); form.style.display='flex';
        const btn=document.getElementById('save-btn'); btn.disabled=false; btn.textContent='ENREGISTRER →';
        const inp=document.getElementById('player-name'); inp.value=localStorage.getItem('rabargo_name')||'';
        setTimeout(()=>inp.focus(),150);
      } else { loadLeaderboard(null); }
    }

    // ── Leaderboard ───────────────────────
    async function saveScore() {
      const inp=document.getElementById('player-name');
      const name=inp.value.trim()||'Anonyme';
      localStorage.setItem('rabargo_name',name);
      const btn=document.getElementById('save-btn'); btn.disabled=true; btn.textContent='…';
      await db.from('scores').insert({game:'breakout',player:name,score:savedScore});
      await loadLeaderboard(name);
    }
    async function loadLeaderboard(myName) {
      document.getElementById('score-form').style.display='none';
      const {data}=await db.from('scores').select('player,score').eq('game','breakout').order('score',{ascending:false}).limit(8);
      const table=document.getElementById('lb-table'); table.innerHTML='';
      (data||[]).forEach((row,i)=>{
        const isMe=myName&&row.player===myName&&row.score===savedScore;
        const div=document.createElement('div');
        div.className='lb-row'+(i===0?' top1':'')+(isMe?' me':'');
        div.innerHTML=`<span>${i+1}. ${row.player.replace(/</g,'&lt;')}</span><span>${row.score}</span>`;
        table.appendChild(div);
      });
      document.getElementById('lb-wrap').style.display='flex';
    }

    // ── Controls ──────────────────────────
    document.addEventListener('keydown',e=>{
      keys[e.key]=true;
      if(e.key===' '||e.key==='ArrowUp'){e.preventDefault(); if(running) launchBall();}
      if(e.key==='ArrowLeft'||e.key==='ArrowRight') e.preventDefault();
    });
    document.addEventListener('keyup',e=>{keys[e.key]=false;});

    // Mouse paddle
    canvas.addEventListener('mousemove',e=>{
      const rect=canvas.getBoundingClientRect();
      padX=((e.clientX-rect.left)/rect.width)*CW;
      padX=Math.max(padW/2, Math.min(CW-padW/2, padX));
    });
    canvas.addEventListener('click',()=>{ if(running) launchBall(); });

    // Touch paddle
    canvas.addEventListener('touchmove',e=>{
      e.preventDefault();
      const rect=canvas.getBoundingClientRect();
      padX=((e.touches[0].clientX-rect.left)/rect.width)*CW;
      padX=Math.max(padW/2, Math.min(CW-padW/2, padX));
    },{passive:false});
    canvas.addEventListener('touchstart',e=>{
      e.preventDefault();
      if(running) launchBall();
    },{passive:false});

    document.getElementById('start-btn').addEventListener('click',startGame);
    document.getElementById('save-btn').addEventListener('click',saveScore);
    document.getElementById('player-name').addEventListener('keydown',e=>{if(e.key==='Enter')saveScore();});
    window.addEventListener('resize',()=>{ calcSize(); if(!running) draw(); });
    draw();
  </script>
</body>
</html>
