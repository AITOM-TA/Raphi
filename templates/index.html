<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rabargo — Game Hub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', monospace;
      color: #fff;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url('/static/photobaguera.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 30%, #0a0a0a 100%);
      pointer-events: none;
      z-index: 0;
    }

    .hero {
      text-align: center;
      margin-bottom: 52px;
      position: relative;
      z-index: 1;
      padding: 0 16px;
    }

    .logo {
      font-size: clamp(2.8rem, 12vw, 7rem);
      font-weight: 900;
      letter-spacing: 0.15em;
      background: linear-gradient(135deg, #fff 30%, #888);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .tagline {
      margin-top: 14px;
      color: #555;
      font-size: clamp(0.65rem, 2vw, 0.8rem);
      letter-spacing: 0.4em;
      text-transform: uppercase;
    }

    .games {
      display: flex;
      gap: 24px;
      position: relative;
      z-index: 1;
      flex-wrap: wrap;
      justify-content: center;
      padding: 0 20px;
    }

    .card {
      width: 240px;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 32px 24px 24px;
      background: #111;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.2s;
      border-radius: inherit;
    }

    .card:hover { transform: translateY(-6px); }
    .card:hover::before { opacity: 1; }
    .card:active { transform: translateY(-2px); }

    .card.snake        { border-color: #4ade8033; }
    .card.snake::before { background: radial-gradient(ellipse at top, #4ade8011, transparent 70%); }
    .card.snake:hover  { border-color: #4ade80aa; box-shadow: 0 0 40px #4ade8033, 0 20px 40px #0008; }

    .card.tetris        { border-color: #60a5fa33; }
    .card.tetris::before { background: radial-gradient(ellipse at top, #60a5fa11, transparent 70%); }
    .card.tetris:hover  { border-color: #60a5faaa; box-shadow: 0 0 40px #60a5fa33, 0 20px 40px #0008; }

    .card.battleship        { border-color: #f59e0b33; }
    .card.battleship::before { background: radial-gradient(ellipse at top, #f59e0b11, transparent 70%); }
    .card.battleship:hover  { border-color: #f59e0baa; box-shadow: 0 0 40px #f59e0b33, 0 20px 40px #0008; }

    .card-icon  { font-size: 2.8rem; line-height: 1; }

    .card-title {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .card.snake .card-title       { color: #4ade80; }
    .card.tetris .card-title      { color: #60a5fa; }
    .card.battleship .card-title  { color: #f59e0b; }

    .card-desc {
      font-size: 0.74rem;
      color: #666;
      text-align: center;
      line-height: 1.7;
      letter-spacing: 0.04em;
    }

    .card-cta {
      margin-top: 6px;
      padding: 10px 26px;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 0.78rem;
      letter-spacing: 0.2em;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .card.snake .card-cta       { background: #4ade80; color: #0a0a0a; }
    .card.tetris .card-cta      { background: #60a5fa; color: #0a0a0a; }
    .card.battleship .card-cta  { background: #f59e0b; color: #0a0a0a; }
    .card-cta:hover { opacity: 0.85; }

    .footer {
      margin-top: 48px;
      padding-bottom: 24px;
      color: #333;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      z-index: 1;
      position: relative;
    }

    /* ── Mobile ───────────────────────────── */
    @media (max-width: 540px) {
      .hero { margin-bottom: 36px; }
      .games { gap: 16px; padding: 0 16px; }
      .card {
        width: 100%;
        max-width: 360px;
        flex-direction: row;
        padding: 18px 20px;
        gap: 16px;
        align-items: center;
        text-align: left;
      }
      .card-icon { font-size: 2.2rem; flex-shrink: 0; }
      .card-body { display: flex; flex-direction: column; gap: 4px; flex: 1; }
      .card-title { font-size: 1.1rem; }
      .card-desc { display: none; }
      .card-cta { padding: 8px 18px; font-size: 0.72rem; flex-shrink: 0; }
    }
  </style>
</head>
<body>

  <div class="hero">
    <div class="logo">RABARGO</div>
    <div class="tagline">Game Hub &nbsp;·&nbsp; choisir un jeu</div>
  </div>

  <div class="games">
    <a class="card snake" href="/snake">
      <div class="card-icon">🐍</div>
      <div class="card-body">
        <div class="card-title">Snake</div>
        <div class="card-desc">Mange les pommes, évite les murs.<br>Bats ton record !</div>
      </div>
      <button class="card-cta">JOUER</button>
    </a>

    <a class="card tetris" href="/tetris">
      <div class="card-icon">🟦</div>
      <div class="card-body">
        <div class="card-title">Tetris</div>
        <div class="card-desc">Empile les pièces, complète les lignes.<br>Jusqu'où iras-tu ?</div>
      </div>
      <button class="card-cta">JOUER</button>
    </a>

    <a class="card battleship" href="/battleship">
      <div class="card-icon">⚓</div>
      <div class="card-body">
        <div class="card-title">Bataille Navale</div>
        <div class="card-desc">1v1 en temps réel avec un ami.<br>Coule sa flotte avant lui !</div>
      </div>
      <button class="card-cta">JOUER</button>
    </a>
  </div>

  <div class="footer">RABARGO &nbsp;·&nbsp; 2025</div>

</body>
</html>
