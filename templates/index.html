<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raphi — Game Hub</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', monospace;
      color: #fff;
      overflow: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 20s linear infinite;
      pointer-events: none;
    }

    @keyframes gridMove {
      0%   { transform: translateY(0); }
      100% { transform: translateY(40px); }
    }

    .hero {
      text-align: center;
      margin-bottom: 64px;
      position: relative;
      z-index: 1;
    }

    .logo {
      font-size: clamp(3rem, 10vw, 7rem);
      font-weight: 900;
      letter-spacing: 0.15em;
      background: linear-gradient(135deg, #fff 30%, #888);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      line-height: 1;
    }

    .tagline {
      margin-top: 14px;
      color: #555;
      font-size: 0.8rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
    }

    .games {
      display: flex;
      gap: 32px;
      position: relative;
      z-index: 1;
      flex-wrap: wrap;
      justify-content: center;
      padding: 0 24px;
    }

    .card {
      width: 260px;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 36px 28px 28px;
      background: #111;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.2s;
      border-radius: inherit;
    }

    .card:hover {
      transform: translateY(-6px);
    }

    .card:hover::before { opacity: 1; }

    /* Snake card */
    .card.snake { border-color: #4ade8033; }
    .card.snake::before { background: radial-gradient(ellipse at top, #4ade8011, transparent 70%); }
    .card.snake:hover { border-color: #4ade80aa; box-shadow: 0 0 40px #4ade8033, 0 20px 40px #0008; }

    /* Tetris card */
    .card.tetris { border-color: #60a5fa33; }
    .card.tetris::before { background: radial-gradient(ellipse at top, #60a5fa11, transparent 70%); }
    .card.tetris:hover { border-color: #60a5faaa; box-shadow: 0 0 40px #60a5fa33, 0 20px 40px #0008; }

    .card-icon {
      font-size: 3rem;
      line-height: 1;
    }

    .card-title {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .card.snake .card-title { color: #4ade80; }
    .card.tetris .card-title { color: #60a5fa; }
    .card.battleship .card-title { color: #f59e0b; }

    /* Battleship card */
    .card.battleship { border-color: #f59e0b33; }
    .card.battleship::before { background: radial-gradient(ellipse at top, #f59e0b11, transparent 70%); }
    .card.battleship:hover { border-color: #f59e0baa; box-shadow: 0 0 40px #f59e0b33, 0 20px 40px #0008; }

    .card-desc {
      font-size: 0.78rem;
      color: #666;
      text-align: center;
      line-height: 1.7;
      letter-spacing: 0.05em;
    }

    .card-cta {
      margin-top: 8px;
      padding: 10px 28px;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .card.snake .card-cta { background: #4ade80; color: #0a0a0a; }
    .card.tetris .card-cta { background: #60a5fa; color: #0a0a0a; }
    .card.battleship .card-cta { background: #f59e0b; color: #0a0a0a; }
    .card-cta:hover { opacity: 0.85; }

    .footer {
      position: fixed;
      bottom: 24px;
      color: #333;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      z-index: 1;
    }
  </style>
</head>
<body>

  <div class="hero">
    <div class="logo">RAPHI</div>
    <div class="tagline">Game Hub &nbsp;·&nbsp; choisir un jeu</div>
  </div>

  <div class="games">
    <a class="card snake" href="/snake">
      <div class="card-icon">🐍</div>
      <div class="card-title">Snake</div>
      <div class="card-desc">Mange les pommes, évite les murs.<br>Bats ton record !</div>
      <button class="card-cta">JOUER</button>
    </a>

    <a class="card tetris" href="/tetris">
      <div class="card-icon">🟦</div>
      <div class="card-title">Tetris</div>
      <div class="card-desc">Empile les pièces, complète les lignes.<br>Jusqu'où iras-tu ?</div>
      <button class="card-cta">JOUER</button>
    </a>

    <a class="card battleship" href="/battleship">
      <div class="card-icon">⚓</div>
      <div class="card-title">Bataille Navale</div>
      <div class="card-desc">1v1 en temps réel avec un ami.<br>Coule sa flotte avant lui !</div>
      <button class="card-cta">JOUER</button>
    </a>
  </div>

  <div class="footer">RAPHI &nbsp;·&nbsp; 2025</div>

</body>
</html>
