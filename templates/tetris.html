<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris — Rabargo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #fff;
      padding: 16px;
    }

    .back {
      position: fixed;
      top: 16px;
      left: 16px;
      color: #555;
      text-decoration: none;
      font-size: 0.78rem;
      letter-spacing: 0.15em;
      transition: color 0.15s;
      z-index: 10;
    }
    .back:hover { color: #60a5fa; }

    h1 {
      font-size: clamp(1.6rem, 6vw, 2.5rem);
      letter-spacing: 0.3em;
      color: #60a5fa;
      text-shadow: 0 0 20px #60a5fa88;
      margin-bottom: 16px;
    }

    /* ── Compact score bar (mobile) ─────── */
    #score-bar {
      display: none;
      gap: 24px;
      margin-bottom: 12px;
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      color: #666;
    }
    #score-bar span { color: #60a5fa; font-size: 1rem; font-weight: bold; }

    /* ── Desktop layout ─────────────────── */
    .game-area {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    #game-wrapper {
      position: relative;
      border: 2px solid #60a5fa44;
      border-radius: 4px;
      box-shadow: 0 0 40px #60a5fa22;
      flex-shrink: 0;
    }

    canvas { display: block; }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.85);
      border-radius: 4px;
      gap: 14px;
      padding: 20px;
    }
    #overlay h2 {
      font-size: clamp(1.4rem, 5vw, 1.8rem);
      color: #60a5fa;
      text-shadow: 0 0 16px #60a5fa;
      letter-spacing: 0.2em;
    }
    #overlay p { color: #aaa; font-size: 0.85rem; letter-spacing: 0.05em; text-align: center; }
    #overlay button {
      margin-top: 6px;
      padding: 12px 36px;
      background: transparent;
      border: 2px solid #60a5fa;
      color: #60a5fa;
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      letter-spacing: 0.2em;
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.15s, color 0.15s;
    }
    #overlay button:hover, #overlay button:active { background: #60a5fa; color: #0a0a0a; }

    /* ── Sidebar (desktop only) ─────────── */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-width: 110px;
    }

    .panel {
      border: 1px solid #1e1e1e;
      border-radius: 6px;
      padding: 12px;
      background: #0f0f0f;
    }
    .panel-label { font-size: 0.62rem; letter-spacing: 0.2em; color: #555; margin-bottom: 6px; text-transform: uppercase; }
    .panel-value { font-size: 1.3rem; font-weight: bold; color: #60a5fa; }

    #next-canvas { display: block; margin-top: 6px; }

    #controls-panel { font-size: 0.65rem; color: #444; line-height: 2; letter-spacing: 0.04em; }
    #controls-panel span { color: #666; }

    /* ── Mobile touch controls ──────────── */
    #touch-controls {
      display: none;
      margin-top: 16px;
      gap: 10px;
      align-items: center;
    }

    .tc {
      width: 58px;
      height: 58px;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      color: #60a5fa;
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s;
      flex-shrink: 0;
    }
    .tc:active { background: #0e1c2e; }
    .tc-drop { font-size: 1.1rem; }

    /* ── Responsive ─────────────────────── */
    @media (max-width: 600px), (pointer: coarse) and (max-width: 900px) {
      .sidebar        { display: none; }
      #score-bar      { display: flex; }
      #touch-controls { display: flex; }
    }

    /* ── Classement ─────────────────────── */
    #score-form { display:none; flex-direction:column; align-items:center; gap:8px; width:100%; }
    #player-name {
      background:#0a0a0a; border:1px solid #60a5fa44;
      color:#fff; font-family:'Courier New',monospace;
      font-size:0.95rem; padding:8px 14px; border-radius:3px;
      letter-spacing:0.12em; text-align:center; width:180px;
    }
    #player-name:focus { outline:none; border-color:#60a5fa; }
    #save-btn {
      padding:9px 24px; background:#60a5fa; border:2px solid #60a5fa;
      color:#0a0a0a; font-family:'Courier New',monospace;
      font-size:0.78rem; letter-spacing:0.15em;
      cursor:pointer; border-radius:2px; font-weight:700; transition:opacity 0.15s;
    }
    #save-btn:disabled { opacity:0.5; cursor:default; }
    #lb-wrap { display:none; flex-direction:column; align-items:center; width:100%; gap:6px; }
    .lb-ttl  { font-size:0.56rem; letter-spacing:0.3em; color:#60a5fa66; }
    #lb-table { width:100%; max-width:210px; }
    .lb-row { display:flex; justify-content:space-between; font-size:0.74rem; padding:3px 0; border-bottom:1px solid #181818; color:#555; }
    .lb-row.top1 { color:#fff; font-weight:700; }
    .lb-row.me   { color:#60a5fa; }
  </style>
</head>
<body>
  <a class="back" href="/">← RABARGO</a>
  <h1>TETRIS</h1>

  <!-- Compact score row (mobile) -->
  <div id="score-bar">
    SCORE&nbsp;<span id="score2">0</span>
    &nbsp;NV&nbsp;<span id="level2">1</span>
    &nbsp;LIGNES&nbsp;<span id="lines2">0</span>
  </div>

  <div class="game-area">
    <div id="game-wrapper">
      <canvas id="canvas"></canvas>
      <div id="overlay">
        <h2 id="overlay-title">TETRIS</h2>
        <p id="overlay-msg">Complète des lignes pour marquer des points</p>
        <div id="score-form">
          <input id="player-name" type="text" placeholder="Ton prénom" maxlength="16" autocomplete="off" spellcheck="false" />
          <button id="save-btn">ENREGISTRER →</button>
        </div>
        <div id="lb-wrap">
          <div class="lb-ttl">TOP SCORES — TETRIS</div>
          <div id="lb-table"></div>
        </div>
        <button id="start-btn">JOUER</button>
      </div>
    </div>

    <div class="sidebar">
      <div class="panel">
        <div class="panel-label">Score</div>
        <div class="panel-value" id="score">0</div>
      </div>
      <div class="panel">
        <div class="panel-label">Niveau</div>
        <div class="panel-value" id="level">1</div>
      </div>
      <div class="panel">
        <div class="panel-label">Lignes</div>
        <div class="panel-value" id="lines">0</div>
      </div>
      <div class="panel">
        <div class="panel-label">Suivant</div>
        <canvas id="next-canvas" width="80" height="80"></canvas>
      </div>
      <div class="panel" id="controls-panel">
        <span>← →</span> Déplacer<br>
        <span>↑</span> Rotation<br>
        <span>↓</span> Descendre<br>
        <span>Espace</span> Drop<br>
        <span>P</span> Pause
      </div>
    </div>
  </div>

  <!-- Touch controls (mobile) -->
  <div id="touch-controls">
    <button class="tc" id="tc-left">◀</button>
    <button class="tc" id="tc-rotate">↺</button>
    <button class="tc" id="tc-down">▼</button>
    <button class="tc" id="tc-right">▶</button>
    <button class="tc tc-drop" id="tc-drop">⬇</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const SUPABASE_URL = 'https://phqyccawwwpdvslxzljl.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBocXljY2F3d3dwZHZzbHh6bGpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDU4NzQzNjYsImV4cCI6MjA2MTQ1MDM2Nn0.0XaL9_7uEFkVF_PizrtpAcbQ9kqgMnMyqWVUGbeMHvo';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let savedScore = 0;

    const COLS = 10, ROWS = 20;
    const canvas     = document.getElementById('canvas');
    const ctx        = canvas.getContext('2d');
    const nextCanvas = document.getElementById('next-canvas');
    const nctx       = nextCanvas.getContext('2d');

    const scoreEl  = document.getElementById('score');
    const levelEl  = document.getElementById('level');
    const linesEl  = document.getElementById('lines');
    const score2El = document.getElementById('score2');
    const level2El = document.getElementById('level2');
    const lines2El = document.getElementById('lines2');

    const overlay      = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const overlayMsg   = document.getElementById('overlay-msg');
    const startBtn     = document.getElementById('start-btn');

    let CELL;
    function calcCell() {
      const maxW = Math.min(window.innerWidth - 32, 300);
      CELL = Math.max(20, Math.floor(maxW / COLS));
      canvas.width  = COLS * CELL;
      canvas.height = ROWS * CELL;
      const nc = Math.max(16, Math.round(CELL * 0.75));
      nextCanvas.width = nextCanvas.height = nc * 4 + 4;
    }
    calcCell();

    const PIECES = [
      { shape:[[1,1,1,1]],             color:'#22d3ee' },
      { shape:[[1,1],[1,1]],           color:'#fbbf24' },
      { shape:[[0,1,0],[1,1,1]],       color:'#a855f7' },
      { shape:[[1,0,0],[1,1,1]],       color:'#f97316' },
      { shape:[[0,0,1],[1,1,1]],       color:'#60a5fa' },
      { shape:[[0,1,1],[1,1,0]],       color:'#4ade80' },
      { shape:[[1,1,0],[0,1,1]],       color:'#f87171' },
    ];

    let board, current, next, score, level, lines, running, paused, dropTimer, dropInterval;

    function newBoard() {
      return Array.from({ length: ROWS }, () => Array(COLS).fill(null));
    }
    function randomPiece() {
      const p = PIECES[Math.floor(Math.random() * PIECES.length)];
      return { shape: p.shape.map(r => [...r]), color: p.color,
               x: Math.floor((COLS - p.shape[0].length) / 2), y: 0 };
    }
    function rotate(shape) {
      const R = shape.length, C = shape[0].length;
      const out = Array.from({ length: C }, () => Array(R).fill(0));
      for (let r = 0; r < R; r++)
        for (let c = 0; c < C; c++)
          out[c][R-1-r] = shape[r][c];
      return out;
    }
    function collides(piece, dx=0, dy=0, shape=piece.shape) {
      for (let r = 0; r < shape.length; r++)
        for (let c = 0; c < shape[r].length; c++) {
          if (!shape[r][c]) continue;
          const nx = piece.x + c + dx, ny = piece.y + r + dy;
          if (nx < 0 || nx >= COLS || ny >= ROWS) return true;
          if (ny >= 0 && board[ny][nx]) return true;
        }
      return false;
    }
    function lock() {
      for (let r = 0; r < current.shape.length; r++)
        for (let c = 0; c < current.shape[r].length; c++) {
          if (!current.shape[r][c]) continue;
          const ny = current.y + r;
          if (ny < 0) { gameOver(); return; }
          board[ny][current.x + c] = current.color;
        }
      clearLines();
      current = next;
      next    = randomPiece();
      if (collides(current)) { gameOver(); return; }
      drawNext();
    }
    function clearLines() {
      let cleared = 0;
      for (let r = ROWS - 1; r >= 0; r--) {
        if (board[r].every(c => c)) {
          board.splice(r, 1);
          board.unshift(Array(COLS).fill(null));
          cleared++; r++;
        }
      }
      if (cleared) {
        const pts = [0,100,300,500,800][cleared] * level;
        score += pts; lines += cleared;
        level = Math.floor(lines / 10) + 1;
        dropInterval = Math.max(80, 1000 - (level - 1) * 80);
        scoreEl.textContent = score2El.textContent = score;
        levelEl.textContent = level2El.textContent = level;
        linesEl.textContent = lines2El.textContent = lines;
      }
    }

    function drawCell(context, col, row, color, size) {
      const x = col * size, y = row * size;
      context.fillStyle  = color;
      context.shadowColor = color;
      context.shadowBlur  = 5;
      context.beginPath();
      context.roundRect(x+1, y+1, size-2, size-2, 2);
      context.fill();
      context.shadowBlur = 0;
      context.fillStyle = 'rgba(255,255,255,0.14)';
      context.beginPath();
      context.roundRect(x+3, y+3, size-6, (size-6)*0.38, 2);
      context.fill();
    }

    function draw() {
      ctx.fillStyle = '#0f0f0f';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = '#181818'; ctx.lineWidth = 0.5;
      for (let i = 0; i <= COLS; i++) {
        ctx.beginPath(); ctx.moveTo(i*CELL,0); ctx.lineTo(i*CELL,canvas.height); ctx.stroke();
      }
      for (let i = 0; i <= ROWS; i++) {
        ctx.beginPath(); ctx.moveTo(0,i*CELL); ctx.lineTo(canvas.width,i*CELL); ctx.stroke();
      }

      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++)
          if (board[r][c]) drawCell(ctx, c, r, board[r][c], CELL);

      // Ghost
      let ghostY = current.y;
      while (!collides(current, 0, ghostY - current.y + 1)) ghostY++;
      if (ghostY !== current.y) {
        for (let r = 0; r < current.shape.length; r++)
          for (let c = 0; c < current.shape[r].length; c++) {
            if (!current.shape[r][c]) continue;
            ctx.strokeStyle = current.color + '44';
            ctx.lineWidth   = 1.5;
            ctx.strokeRect((current.x+c)*CELL+2, (ghostY+r)*CELL+2, CELL-4, CELL-4);
          }
      }

      // Current piece
      for (let r = 0; r < current.shape.length; r++)
        for (let c = 0; c < current.shape[r].length; c++)
          if (current.shape[r][c]) drawCell(ctx, current.x+c, current.y+r, current.color, CELL);
    }

    function drawNext() {
      const nc = Math.max(16, Math.round(CELL * 0.75));
      nextCanvas.width = nextCanvas.height = nc * 4 + 4;
      nctx.fillStyle = '#0f0f0f';
      nctx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
      const s = next.shape;
      const offX = Math.floor((nextCanvas.width  - s[0].length * nc) / 2);
      const offY = Math.floor((nextCanvas.height - s.length    * nc) / 2);
      for (let r = 0; r < s.length; r++)
        for (let c = 0; c < s[r].length; c++) {
          if (!s[r][c]) continue;
          nctx.fillStyle  = next.color;
          nctx.shadowColor = next.color;
          nctx.shadowBlur  = 4;
          nctx.beginPath();
          nctx.roundRect(offX + c*nc + 1, offY + r*nc + 1, nc-2, nc-2, 2);
          nctx.fill();
          nctx.shadowBlur = 0;
        }
    }

    function drop() {
      if (!collides(current, 0, 1)) { current.y++; } else { lock(); }
      draw();
    }

    function gameLoop(ts) {
      if (!running || paused) return;
      if (ts - dropTimer >= dropInterval) { drop(); dropTimer = ts; }
      draw();
      requestAnimationFrame(gameLoop);
    }

    function gameOver() {
      running = false;
      savedScore = score;
      overlayTitle.textContent = 'GAME OVER';
      overlayMsg.textContent   = `Score : ${score}`;
      startBtn.textContent     = 'REJOUER';
      overlay.style.display    = 'flex';
      document.getElementById('lb-wrap').style.display = 'none';
      if (score > 0) {
        const form = document.getElementById('score-form');
        form.style.display = 'flex';
        const btn = document.getElementById('save-btn');
        btn.disabled = false; btn.textContent = 'ENREGISTRER →';
        const inp = document.getElementById('player-name');
        inp.value = localStorage.getItem('rabargo_name') || '';
        setTimeout(() => inp.focus(), 150);
      } else {
        loadLeaderboard(null);
      }
    }

    function startGame() {
      calcCell();
      board = newBoard();
      score = 0; level = 1; lines = 0;
      dropInterval = 1000;
      [scoreEl,score2El].forEach(e => e.textContent = 0);
      [levelEl,level2El].forEach(e => e.textContent = 1);
      [linesEl,lines2El].forEach(e => e.textContent = 0);
      current = randomPiece(); next = randomPiece();
      drawNext();
      overlay.style.display = 'none';
      document.getElementById('score-form').style.display = 'none';
      document.getElementById('lb-wrap').style.display = 'none';
      running = true; paused = false; dropTimer = 0;
      requestAnimationFrame(ts => { dropTimer = ts; requestAnimationFrame(gameLoop); });
    }

    async function saveScore() {
      const inp  = document.getElementById('player-name');
      const name = inp.value.trim() || 'Anonyme';
      localStorage.setItem('rabargo_name', name);
      const btn = document.getElementById('save-btn');
      btn.disabled = true; btn.textContent = '…';
      await db.from('scores').insert({ game:'tetris', player:name, score:savedScore });
      await loadLeaderboard(name);
    }

    async function loadLeaderboard(myName) {
      document.getElementById('score-form').style.display = 'none';
      const { data } = await db.from('scores')
        .select('player,score').eq('game','tetris')
        .order('score', { ascending:false }).limit(8);
      const table = document.getElementById('lb-table');
      table.innerHTML = '';
      (data||[]).forEach((row, i) => {
        const isMe = myName && row.player === myName && row.score === savedScore;
        const div = document.createElement('div');
        div.className = 'lb-row' + (i===0?' top1':'') + (isMe?' me':'');
        div.innerHTML = `<span>${i+1}. ${row.player.replace(/</g,'&lt;')}</span><span>${row.score}</span>`;
        table.appendChild(div);
      });
      document.getElementById('lb-wrap').style.display = 'flex';
    }

    document.getElementById('save-btn').addEventListener('click', saveScore);
    document.getElementById('player-name').addEventListener('keydown', e => { if(e.key==='Enter') saveScore(); });

    startBtn.addEventListener('click', startGame);

    // ── Keyboard ──────────────────────────
    document.addEventListener('keydown', e => {
      if (!running) return;
      if (e.key === 'p' || e.key === 'P') {
        paused = !paused;
        if (!paused) requestAnimationFrame(ts => { dropTimer = ts; requestAnimationFrame(gameLoop); });
        return;
      }
      if (paused) return;
      switch (e.key) {
        case 'ArrowLeft':  if (!collides(current,-1,0)) { current.x--; draw(); } e.preventDefault(); break;
        case 'ArrowRight': if (!collides(current,1,0))  { current.x++; draw(); } e.preventDefault(); break;
        case 'ArrowDown':  drop(); e.preventDefault(); break;
        case 'ArrowUp': {
          const rot = rotate(current.shape);
          if      (!collides(current,0,0,rot))  { current.shape = rot; }
          else if (!collides(current,1,0,rot))  { current.shape = rot; current.x++; }
          else if (!collides(current,-1,0,rot)) { current.shape = rot; current.x--; }
          draw(); e.preventDefault(); break;
        }
        case ' ':
          while (!collides(current,0,1)) current.y++;
          lock(); draw(); e.preventDefault(); break;
      }
    });

    // ── Touch controls ────────────────────
    function tcAction(action) {
      if (!running || paused) return;
      switch (action) {
        case 'left':   if (!collides(current,-1,0)) { current.x--; draw(); } break;
        case 'right':  if (!collides(current,1,0))  { current.x++; draw(); } break;
        case 'down':   drop(); break;
        case 'rotate': {
          const rot = rotate(current.shape);
          if      (!collides(current,0,0,rot))  { current.shape = rot; }
          else if (!collides(current,1,0,rot))  { current.shape = rot; current.x++; }
          else if (!collides(current,-1,0,rot)) { current.shape = rot; current.x--; }
          draw(); break;
        }
        case 'drop':
          while (!collides(current,0,1)) current.y++;
          lock(); draw(); break;
      }
    }

    [
      ['tc-left','left'], ['tc-right','right'], ['tc-down','down'],
      ['tc-rotate','rotate'], ['tc-drop','drop'],
    ].forEach(([id, action]) => {
      const btn = document.getElementById(id);
      btn.addEventListener('touchstart', e => { e.preventDefault(); tcAction(action); }, { passive:false });
      btn.addEventListener('click', () => tcAction(action));
    });

    // Auto-repeat for left/right/down on hold
    let holdTimer, holdInterval;
    ['tc-left','tc-right','tc-down'].forEach(id => {
      const btn = document.getElementById(id);
      const action = id.replace('tc-','');
      btn.addEventListener('touchstart', () => {
        holdTimer = setTimeout(() => {
          holdInterval = setInterval(() => tcAction(action), 80);
        }, 250);
      }, { passive:true });
      ['touchend','touchcancel'].forEach(ev =>
        btn.addEventListener(ev, () => { clearTimeout(holdTimer); clearInterval(holdInterval); })
      );
    });

    // ── Resize ────────────────────────────
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => { calcCell(); if (!running) draw(); }, 150);
    });
  </script>
</body>
</html>
